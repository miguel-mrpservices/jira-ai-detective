name: jira-ai-detective

on:
  push:
    branches: [ "**" ] 

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_jira_site: ${{ secrets.JIRA_SITE }}
      TF_VAR_jira_email: ${{ secrets.JIRA_EMAIL }}
      TF_VAR_jira_api_token: ${{ secrets.JIRA_API_TOKEN }}
      TF_VAR_webhook_secret_token: ${{ secrets.WEBHOOK_SECRET_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: ./infra

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra
        
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./infra

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./infra

      - name: Terraform Apply
        #This step ll be just executed if working in main
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: ./infra